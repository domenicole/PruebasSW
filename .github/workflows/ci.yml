name: CI/CD Workflow

on: 
  push: 
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test: 
    name: Validar lint y pruebas
    runs-on: ubuntu-latest
    steps: 
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
          cache: 'npm'
      
      - name: Instalar las dependencias
        run: npm ci

      - name: Ejecutar lint del código
        run: npm run lint
      
      - name: Ejecutar pruebas unitarias
        run: npm test 

  despliegue-produccion:
    name: Desplegar en Vercel
    runs-on: ubuntu-latest
    needs: build-and-test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env: 
      VERCEL_ORG_ID: ${{secrets.VERCEL_ORG_ID}}
      VERCEL_PROJECT_ID: ${{secrets.VERCEL_PROJECT_ID}}

    steps: 
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
          cache: 'npm'

      - name: Instalar las dependencias
        run: npm ci

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Obtener configuracion de Vercel
        run: vercel pull --yes --environment=production --token=${{secrets.VERCEL_TOKEN}}

      - name: Construir el proyecto
        run: vercel build --prod --token=${{secrets.VERCEL_TOKEN}}

      - name: Desplegar en produccion
        run: vercel deploy --prebuilt --prod --token=${{secrets.VERCEL_TOKEN}}